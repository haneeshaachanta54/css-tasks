<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f7ead7;
    overflow:hidden;
}

.container{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.gallery{
    position:relative;
    width:700px;
    height:600px;
}

.box{
    position:absolute;
    width:170px;
    height:170px;
    transform:rotate(45deg);
    overflow:hidden;
    border-radius:15px;
    border:6px solid #d8a24d;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.box img{
    width:140%;
    height:140%;
    object-fit:cover;
    transform:rotate(-45deg) scale(1.15);
    margin-left:-30px;
    margin-top:-30px;
}

/* Positions */

.top-left{
    top:0;
    left:90px;
}

.top-right{
    top:0;
    right:90px;
}

.center{
    width:250px;
    height:250px;
    left:225px;
    top:175px;
}

.bottom-left{
    bottom:0;
    left:90px;
}

.bottom-right{
    bottom:0;
    right:90px;
}

/* Background Food Icons */

.icon{
    position:absolute;
    font-size:90px;
    opacity:.08;
}

.i1{
    top:40px;
    left:70px;
}

.i2{
    top:70px;
    right:80px;
}

.i3{
    bottom:60px;
    left:120px;
}

.i4{
    bottom:90px;
    right:90px;
}

.i5{
    left:45%;
    top:15px;
}
</style>
</head>

<body>

<div class="container">

<div class="icon i1">🍕</div>
<div class="icon i2">🍔</div>
<div class="icon i3">🍜</div>
<div class="icon i4">🍣</div>
<div class="icon i5">👨‍🍳</div>

<div class="gallery">

<div class="box top-left">
<img src="https://images.unsplash.com/photo-1552611052-33e04de081de?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8Zm9vZCUyMGltYWdlc3xlbnwwfHwwfHx8MA%3D%3D" alt="">
</div>

<div class="box top-right">
<img src="https://images.unsplash.com/photo-1568625365131-079e026a927d?q=80&w=880&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
</div>

<div class="box center">
<img src="https://plus.unsplash.com/premium_photo-1683619761468-b06992704398?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OXx8Zm9vZCUyMGltYWdlc3xlbnwwfHwwfHx8MA%3D%3D" alt="">
</div>

<div class="box bottom-left">
<img src="https://plus.unsplash.com/premium_photo-1673590981810-894dadc93a6d?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTN8fGZvb2QlMjBpbWFnZXN8ZW58MHx8MHx8fDA%3D" alt="">
</div>

<div class="box bottom-right">
<img src="https://plus.unsplash.com/premium_photo-1663852297267-827c73e7529e?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTd8fGZvb2QlMjBpbWFnZXN8ZW58MHx8MHx8fDA%3D" alt="">
</div>

</div>

</div>

</body>
</html>
